{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="auto">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>НООПЕПТ для лифтов</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
</head>
<body>
<div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
        <div class="col-md-3 mb-2 mb-md-0"></div>
        <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li><a href="{% url 'lifts:building_list' %}" class="nav-link px-2 link-secondary">Главная</a></li>
        </ul>

        <div class="col-md-3 text-end">
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'lifts:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Выйти из учётной записи</button>
            </form>
            {% endif %}
        </div>
    </header>
</div>


<div class="container">
    {% block content %}
    {% endblock %}
</div>

<style>
    .badge-danger {
        color: red;
    }

    .badge-success {
        color: green;
    }
</style>
<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
