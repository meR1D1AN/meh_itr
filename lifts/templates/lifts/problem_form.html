{% extends 'lifts/base.html' %}

{% block content %}
<h1 style="text-align: center;">Добавить проблему</h1>

<form method="post">
    {% csrf_token %}
    <div class="form-group" style="text-align: center;">
        <label for="id_problem"><strong>Информация о проблеме:</strong></label>
	<br>
        {{ form.problem }}
	<style>
    		textarea, input {
        		width: 100%;  /* Полная ширина */
        		box-sizing: border-box;  /* Учитывать отступы и границы в ширину */
    		}
	</style>
    </div>
    <div style="text-align: center;">
	    <button type="submit" class="btn btn-primary">Добавить</button>
	    <a href="{% url 'lifts:elevator_detail' elevator.id %}" class="btn btn-secondary">Назад к лифту</a>
    </div>
</form>
{% endblock %}
